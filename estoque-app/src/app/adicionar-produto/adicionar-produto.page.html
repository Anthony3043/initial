<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Adicionar Produto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form (ngSubmit)="adicionarProduto()" #produtoForm="ngForm">
    <ion-item>
      <ion-label position="stacked">Nome do Produto</ion-label>
      <ion-input 
        [(ngModel)]="produto.nome" 
        name="nome" 
        required 
        placeholder="Digite o nome do produto">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Preço (R$)</ion-label>
      <ion-input 
        [(ngModel)]="produto.preco" 
        name="preco" 
        type="number" 
        step="0.01" 
        required 
        placeholder="0,00">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Quantidade</ion-label>
      <ion-input 
        [(ngModel)]="produto.quantidade" 
        name="quantidade" 
        type="number" 
        required 
        placeholder="0">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Descrição (Opcional)</ion-label>
      <ion-textarea 
        [(ngModel)]="produto.descricao" 
        name="descricao" 
        placeholder="Descrição do produto">
      </ion-textarea>
    </ion-item>

    <ion-button 
      expand="block" 
      type="submit" 
      [disabled]="!produtoForm.valid" 
      class="ion-margin">
      Adicionar Produto
    </ion-button>
  </form>
</ion-content>

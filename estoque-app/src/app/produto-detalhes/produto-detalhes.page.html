<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Detalhes do Produto</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/produtos"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card *ngIf="produto">
    <ion-card-header>
      <ion-card-title>{{ produto.nome }}</ion-card-title>
      <ion-card-subtitle>{{ produto.categoria }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p><strong>Preço:</strong> R$ {{ produto.preco | number:'1.2-2' }}</p>
      <p><strong>Quantidade:</strong> {{ produto.quantidade }}</p>
      <p><strong>Descrição:</strong> {{ produto.descricao || 'N/A' }}</p>
      <p><strong>Data de Atualização:</strong> {{ produto.dataAtualizacao | date:'dd/MM/yyyy HH:mm' }}</p>
    </ion-card-content>
  </ion-card>

  <ion-card *ngIf="!produto">
    <ion-card-content>
      <p>Produto não encontrado.</p>
    </ion-card-content>
  </ion-card>
</ion-content>
